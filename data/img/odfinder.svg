<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Document Gradient: Teal to Blue -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Folded Corner Gradient -->
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.3" />
    </linearGradient>

    <!-- Magnifying Glass handle gradient -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    
    <!-- Shadow for modern depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Main Group with drop shadow -->
  <g filter="url(#dropShadow)">
    <!-- Document Base Sheet -->
    <path d="M 16 12 
             L 204 12 
             L 244 52 
             L 244 240 
             A 8 8 0 0 1 236 248 
             L 24 248 
             A 8 8 0 0 1 16 240 
             Z" 
          fill="url(#docGrad)" />

    <!-- Folded Corner Page Tip -->
    <path d="M 204 12 
             L 244 52 
             L 212 52 
             A 8 8 0 0 1 204 44 
             Z" 
          fill="url(#foldGrad)" />

    <!-- Original Owl Logo Scaled in Top-Left Corner -->
    <g transform="translate(24, 24) scale(0.085)" fill="#ffffff" fill-opacity="0.95">
      <path d="M467.054,160.244c0-58.282-47.246-105.527-105.527-105.527h-0.002l35.176-52.763c0,0-105.525-17.588-140.701,52.762 C220.823-15.634,115.298,1.954,115.298,1.954l35.177,52.763h-0.002c-58.281,0-105.527,47.244-105.527,105.527 c0,37.585,19.665,70.557,49.251,89.251c-9.056,21.197-14.076,44.531-14.076,69.039c0,57.535,27.629,108.613,70.341,140.702H80.122 H80.12v35.176h0.002h96.861c1.094,9.891,9.475,17.588,19.658,17.588s18.562-7.696,19.658-17.588h0.259 c1.094,9.891,9.474,17.588,19.658,17.588s18.562-7.696,19.658-17.588h0.128h0.002h0.128c1.094,9.891,9.475,17.588,19.658,17.588 s18.562-7.696,19.658-17.588h0.259C296.8,504.304,305.181,512,315.364,512s18.562-7.696,19.658-17.588h96.861v-35.176h-70.341 c42.712-32.089,70.341-83.167,70.341-140.702c0-24.509-5.018-47.842-14.076-69.039 C447.387,230.801,467.054,197.83,467.054,160.244z M150.473,230.596c-38.853,0-70.351-31.496-70.351-70.351 c0-38.855,31.498-70.351,70.351-70.351c38.853,0,70.351,31.496,70.351,70.351C220.825,199.099,189.327,230.596,150.473,230.596z M256,318.533l-52.763-52.762l52.762-52.762v-0.002H256v0.002l52.762,52.762L256,318.533z M361.527,230.596 c-38.853,0-70.351-31.496-70.351-70.351s31.498-70.351,70.351-70.351s70.351,31.496,70.351,70.351S400.38,230.596,361.527,230.596 z"/>
      <circle cx="150.48" cy="160.243" r="35.176"/>
      <circle cx="361.534" cy="160.243" r="35.176"/>
    </g>

    <!-- Semi-transparent decorative document lines to signify text content -->
    <rect x="76" y="32" width="112" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="76" y="48" width="112" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="28" y="84" width="180" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="28" y="100" width="190" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="28" y="116" width="140" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="28" y="132" width="100" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />
    <rect x="28" y="148" width="80" height="6" rx="3" fill="#ffffff" fill-opacity="0.5" />

    <!-- Glassmorphic Magnifying Glass overlay (Search/Finder concept) -->
    <g transform="translate(98, 102) scale(0.68)">
      <!-- Handle -->
      <rect x="140" y="140" width="20" height="70" rx="10" transform="rotate(-45 150 175)" fill="url(#handleGrad)" stroke="#ffffff" stroke-width="3" />
      
      <!-- Lens Outer Ring -->
      <circle cx="90" cy="90" r="50" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="7" />
      
      <!-- Inner lens reflection / highlights -->
      <circle cx="90" cy="90" r="46" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" />
      
      <!-- Diagonal shine on lens -->
      <path d="M 60 60 A 42 42 0 0 1 120 120" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.5" />
    </g>
  </g>
</svg>
