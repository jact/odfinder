name: Release

on:
  push:
    tags:
      - "*"

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgirepository-2.0-dev || sudo apt-get install -y --no-install-recommends libgirepository1.0-dev
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            pkg-config \
            gir1.2-gtk-4.0 \
            python3-gi \
            python3-gi-cairo \
            python3-cairo \
            python3-pytest \
            python3-pytest-asyncio \
            python3-pytest-cov \
            python3-setuptools \
            xvfb \
            debhelper \
            dh-python \
            python3-all \
            gettext \
            build-essential \
            python3-stdeb

      - name: Run tests under Xvfb
        run: xvfb-run python3 -m pytest

      - name: Build Debian package
        run: python3 setup.py --command-packages=stdeb.command bdist_deb

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: deb_dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
