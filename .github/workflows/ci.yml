name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgirepository-2.0-dev || sudo apt-get install -y --no-install-recommends libgirepository1.0-dev
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            pkg-config \
            gir1.2-gtk-4.0 \
            python3-gi \
            python3-gi-cairo \
            python3-cairo \
            python3-pytest \
            python3-pytest-asyncio \
            python3-pytest-cov \
            python3-setuptools \
            xvfb \
            gettext

      - name: Run tests under Xvfb
        run: xvfb-run python3 -m pytest
